@if (preselectedProjectId() && preselectedTaskId()) {
<div class="mb-6">
  <a [routerLink]="['/projects', preselectedProjectId(), 'tasks', preselectedTaskId()]" class="text-indigo-600 hover:text-indigo-800 font-medium flex items-center gap-2 transition-colors w-fit">
    <i class="pi pi-arrow-left"></i> Volver a la Tarea
  </a>
</div>
}

<div class="max-w-2xl mx-auto p-8 bg-white shadow-xl shadow-indigo-100/50 rounded-3xl mt-4 border border-gray-100">
  <div class="flex items-center gap-4 mb-8 border-b border-gray-100 pb-6">
    <div class="w-12 h-12 rounded-2xl bg-gradient-to-tr from-indigo-500 to-purple-500 flex items-center justify-center text-white shadow-lg">
      <i class="pi pi-comment text-2xl"></i>
    </div>
    <div>
      <h2 class="text-3xl font-extrabold text-gray-900 tracking-tight">Agregar Comentario</h2>
      <p class="text-gray-500 mt-1">Aporta detalles o avances a la tarea seleccionada</p>
    </div>
  </div>

  @if (successMessage()) {
  <p-message severity="success" [text]="successMessage() ?? undefined" styleClass="w-full mb-6 block"></p-message>
  }
  @if (errorMessage()) {
  <p-message severity="error" [text]="errorMessage() ?? undefined" styleClass="w-full mb-6 block"></p-message>
  }

  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="flex flex-col gap-6">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 bg-gray-50/50 p-6 rounded-2xl border border-gray-100 mb-2">
      <div class="flex flex-col gap-2">
        <label for="projectId" class="font-bold text-sm text-gray-700">Proyecto <span class="text-red-500">*</span></label>
        <p-select id="projectId" formControlName="projectId" [options]="projects()" optionLabel="name"
          optionValue="id" placeholder="Selecciona un proyecto" [loading]="isProjectsLoading()"
          styleClass="w-full bg-white">
        </p-select>
      </div>

      <div class="flex flex-col gap-2">
        <label for="taskId" class="font-bold text-sm text-gray-700" 
               [ngClass]="form.controls.taskId.disabled ? 'text-gray-400' : 'text-gray-700'">
               Tarea <span class="text-red-500">*</span>
        </label>
        
        <p-select id="taskId" 
            formControlName="taskId" 
            [options]="tasks()" 
            optionLabel="title" 
            optionValue="id"
            placeholder="Selecciona una tarea" 
            [loading]="isTasksLoading()"
            emptyMessage="No hay tareas en este proyecto" 
            styleClass="w-full bg-white"
            [disabled]="form.controls.taskId.disabled">
        </p-select>
      </div>
    </div>

    <div class="flex flex-col gap-2">
      <label for="author" class="font-bold text-sm text-gray-700">Autor <span class="text-red-500">*</span></label>
      <input pInputText id="author" formControlName="author" placeholder="Tu nombre" class="w-full p-3 bg-gray-50 rounded-xl border border-gray-200 focus:border-indigo-500 transition-colors"
          [ngClass]="{'border-red-300': form.controls.author.invalid && form.controls.author.touched}" />
    </div>

    <div class="flex flex-col gap-2">
      <label for="text" class="font-bold text-sm text-gray-700">Comentario <span class="text-red-500">*</span></label>
      <textarea pInputTextarea id="text" formControlName="text" rows="4" placeholder="Escribe tu observación..."
          class="w-full resize-y p-3 bg-gray-50 rounded-xl border border-gray-200 focus:border-indigo-500 transition-colors"
          [ngClass]="{'border-red-300': form.controls.text.invalid && form.controls.text.touched}">
      </textarea>
    </div>

    <div class="flex justify-end mt-6 pt-6 border-t border-gray-100">
      <p-button type="submit" label="Guardar Comentario" icon="pi pi-check" [loading]="isSubmitting()"
          [disabled]="form.invalid || isSubmitting()"
          styleClass="p-button-rounded px-6 py-3 font-bold shadow-md hover:shadow-lg transition-all"
          severity="primary">
      </p-button>
    </div>
  </form>
</div>
